networks:
  matecat-network:
    driver: bridge

services:

  base:
    image: ostico/matecat-noble-base-image
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build: ./NobleBaseImage

      #   filters:
      #     build: ./MateCatFilters/
      #     container_name: matecat-filter
      #     ports:
      #       - "8732:8732"
      #     networks:
      #        - matecat-network

  redis:
    image: redis
    container_name: matecat-redis
    ports:
      - "6379:6379"
    networks:
       - matecat-network

  amq:
    build: ./AMQ/
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    container_name: matecat-amq
    ports:
      - "61613:61613"
      - "61614:61614"
      - "61616:61616"
      - "8161:8161"
    networks:
      matecat-network:
        aliases:
          - amq

  mysql-master:
    build:
      context: ./MySQL/
      args:
        _type_: "master"
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    container_name: matecat-mysql-master
    ports:
     - "3307:3306"
    volumes:
     - ${TEMP_VOLUME_PATH:-../temporary_docker_mount_volume}:/mnt/external_volume:rw
     - master-mysql-data:/var/lib/mysql:rw
    networks:
      matecat-network:
        aliases:
          - mysql-master

  mysql-slave:
    build:
      context: ./MySQL/
      args:
        _type_: "slave"
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    container_name: matecat-mysql-slave
    ports:
     - "3308:3306"
    volumes:
      - ${TEMP_VOLUME_PATH:-../temporary_docker_mount_volume}:/mnt/external_volume:rw
      - slave-mysql-data:/var/lib/mysql:rw
    depends_on:
      - mysql-master
    networks:
      matecat-network:
        aliases:
          - mysql-slave

  proxysql:
    build: ./ProxySQL/
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    container_name: matecat-proxysql
    ports:
      - "3306:3306"
    links:
      - mysql-master
      - mysql-slave
    volumes:
      - ${TEMP_VOLUME_PATH:-../temporary_docker_mount_volume}:/mnt/external_volume:rw
    networks:
       - matecat-network
    depends_on:
      - mysql-master
      - mysql-slave

  smtp4dev:
    image: rnwood/smtp4dev
    container_name: smtp4dev
    hostname: smtp4dev
    environment:
      - ASPNETCORE_URLS=http://+:3000
      - SERVEROPTIONS__URLS=http://+:3000
      - ASPNETCORE_HTTP_PORTS=3000
    ports:
      - "3000:3000"
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "10m"
    restart: unless-stopped
    networks:
      - matecat-network

  matecat:
    build:
      context: ./MateCatApache/
      args:
        USER_UID: ${docker_uid}
        USER_GID: ${docker_gid}
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    container_name: matecat
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
    ## Remove this environment block if you don't need it ##
      XDEBUG_CONFIG: "client_host=host.docker.internal"
      FILTERS_ADDRESS: http://filters:8732/
      PHP_IDE_CONFIG: serverName=dev.matecat.com
#      SMTP_HOST: localhost
#      SMTP_PORT: 2637
    ## Remove this environment block if you don't need it ##
    volumes:
      - ${MATECAT_CERTS_PATH:-../../MateCat/certs/letsencrypt}:/etc/letsencrypt:rw
      - ${MATECAT_SOURCE_PATH:-../../MateCat}:/var/www/matecat:rw
    ports:
      - "80:80"
      - "443:443"
      - "7788:7788"
    networks:
       - matecat-network
    links:
      - proxysql
      - mysql-master
      - mysql-slave
      - redis
      - amq
      - smtp4dev
#      - filters
    depends_on:
      - proxysql
      - mysql-master
      - mysql-slave
      - redis
      - amq
      - smtp4dev
#      - filters

volumes:
  master-mysql-data:
  slave-mysql-data:
